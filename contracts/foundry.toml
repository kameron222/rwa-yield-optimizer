[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

[profile.default.fuzz]
runs = 256
seed = "0xdeadbeef"

# ── Fork profile — used by fork tests ────────────────────────────────────────
[profile.fork]
eth_rpc_url = "${BASE_RPC_URL}"
fork_block_number = 44_800_000

[rpc_endpoints]
base = "${BASE_RPC_URL}"

[etherscan]
base = { key = "${BASESCAN_API_KEY}", url = "https://api.basescan.org/api" }

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
